specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GymMembership
    network: matic
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: GymMembership
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Membership
      abis:
        - name: GymMembership
          file: ./abis/GymMembership.json
      eventHandlers:
        - event: MembershipMinted(indexed uint256,indexed address,uint8,indexed address,uint64)
          handler: handleMembershipMinted
      file: ./src/mappings.ts

specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GymMembership
    network: amoy
    source:
      abi: GymMembership
      address: "0x465CF3a5918534d94BA62F3A7980f5ffB0277168"
      startBlock: 37735241
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Membership
      abis:
        - name: GymMembership
          file: ./abis/GymMembership.json
      eventHandlers:
        - event: MembershipMinted(indexed uint256,indexed address,uint8,indexed address,uint64)
          handler: handleMembershipMinted
        - event: UpdateUser(indexed uint256,indexed address,uint64)
          handler: handleUpdateUser
      file: ./src/mappings.ts
  - kind: ethereum
    name: FlexPassMarket
    network: amoy
    source:
      abi: FlexPassMarket
      address: "0x0e9a4999ABcccE5B1A6989B34Ed549C2Dd72bfC0"
      startBlock: 37735241
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Membership
        - Listing
        - MembershipTransaction
      abis:
        - name: FlexPassMarket
          file: ./abis/FlexPassMarket.json
      eventHandlers:
        - event: MembershipListed(indexed uint256,indexed address,uint256)
          handler: handleMembershipListed
        - event: MembershipSold(indexed uint256,indexed address,indexed address,uint256,uint256)
          handler: handleMembershipSold
        - event: MembershipDelisted(indexed uint256,indexed address)
          handler: handleMembershipDelisted
      file: ./src/mappings.ts
  - kind: ethereum
    name: GymRegistry
    network: amoy
    source:
      abi: GymRegistry
      address: "0xaE12edE4Eab2655b9B1618628c678819693881eA"
      startBlock: 37735241
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Gym
      abis:
        - name: GymRegistry
          file: ./abis/GymRegistry.json
      eventHandlers:
        - event: GymRegistered(indexed address,string,address)
          handler: handleGymRegistered
        - event: GymApproved(indexed address)
          handler: handleGymApproved
      file: ./src/mappings.ts

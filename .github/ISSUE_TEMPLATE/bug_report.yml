name: Bug report
description: Report a reproducible FlexPass bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a FlexPass issue. Please include concrete reproduction details."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, wallet, network, contract address, or package version.
    validations:
      required: false

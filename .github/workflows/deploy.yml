name: Deploy

# Required repository secrets:
# AMOY_RPC_URL, DEPLOYER_PRIVATE_KEY, PROTOCOL_TREASURY, POLYGONSCAN_API_KEY,
# GRAPH_STUDIO_DEPLOY_KEY, VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
on:
  push:
    tags:
      - "v*"

jobs:
  deploy-contracts:
    name: deploy-contracts
    runs-on: ubuntu-latest
    environment: amoy
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Deploy contracts to Polygon Amoy
        working-directory: contracts
        env:
          AMOY_RPC_URL: ${{ secrets.AMOY_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          PROTOCOL_TREASURY: ${{ secrets.PROTOCOL_TREASURY }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        run: forge script script/Deploy.s.sol --rpc-url $AMOY_RPC_URL --broadcast --verify

  deploy-subgraph:
    name: deploy-subgraph
    runs-on: ubuntu-latest
    needs: deploy-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: subgraph/package-lock.json
      - name: Install subgraph dependencies
        working-directory: subgraph
        run: npm ci
      - name: Deploy subgraph to Graph Studio
        working-directory: subgraph
        env:
          GRAPH_STUDIO_DEPLOY_KEY: ${{ secrets.GRAPH_STUDIO_DEPLOY_KEY }}
        run: npx graph deploy flexpass -l $GITHUB_REF_NAME --deploy-key $GRAPH_STUDIO_DEPLOY_KEY

  deploy-frontend:
    name: deploy-frontend
    runs-on: ubuntu-latest
    needs: deploy-subgraph
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Deploy frontend to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel deploy --prod --token $VERCEL_TOKEN

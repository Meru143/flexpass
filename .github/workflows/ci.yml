name: CI

on: [push, pull_request]

jobs:
  lint-contracts:
    name: lint-contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Solhint
        run: npm install --global solhint
      - name: Check Solidity formatting
        working-directory: contracts
        run: forge fmt --check
      - name: Lint Solidity
        working-directory: contracts
        run: solhint 'src/**/*.sol'

  test-contracts:
    name: test-contracts
    runs-on: ubuntu-latest
    needs: lint-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: ${{ runner.os }}-foundry-${{ hashFiles('contracts/foundry.toml', 'contracts/src/**/*.sol', 'contracts/test/**/*.sol') }}
      - name: Run Foundry tests
        working-directory: contracts
        run: forge test -vvv

  fuzz-contracts:
    name: fuzz-contracts
    runs-on: ubuntu-latest
    needs: lint-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: ${{ runner.os }}-foundry-${{ hashFiles('contracts/foundry.toml', 'contracts/src/**/*.sol', 'contracts/test/**/*.sol') }}
      - name: Run targeted fuzz tests
        working-directory: contracts
        run: forge test --fuzz-runs 1000 --match-path 'test/Fuzz.t.sol'

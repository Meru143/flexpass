name: CI

on: [push, pull_request]

jobs:
  lint-contracts:
    name: lint-contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Solhint
        run: npm install --global solhint
      - name: Check Solidity formatting
        working-directory: contracts
        run: forge fmt --check
      - name: Lint Solidity
        working-directory: contracts
        run: solhint 'src/**/*.sol'

  test-contracts:
    name: test-contracts
    runs-on: ubuntu-latest
    needs: lint-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: ${{ runner.os }}-foundry-${{ hashFiles('contracts/foundry.toml', 'contracts/src/**/*.sol', 'contracts/test/**/*.sol') }}
      - name: Run Foundry tests
        working-directory: contracts
        run: forge test -vvv

  fuzz-contracts:
    name: fuzz-contracts
    runs-on: ubuntu-latest
    needs: lint-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: ${{ runner.os }}-foundry-${{ hashFiles('contracts/foundry.toml', 'contracts/src/**/*.sol', 'contracts/test/**/*.sol') }}
      - name: Run targeted fuzz tests
        working-directory: contracts
        run: forge test --fuzz-runs 1000 --match-path 'test/Fuzz.t.sol'

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: test-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: ${{ runner.os }}-foundry-${{ hashFiles('contracts/foundry.toml', 'contracts/src/**/*.sol', 'contracts/test/**/*.sol') }}
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Generate coverage report
        working-directory: contracts
        run: forge coverage --report lcov
      - name: Enforce 90 percent line coverage
        working-directory: contracts
        run: |
          summary="$(lcov --summary lcov.info 2>&1)"
          echo "$summary"
          line_coverage="$(echo "$summary" | awk '/lines/ { gsub("%", "", $2); print $2 }')"
          awk -v coverage="$line_coverage" 'BEGIN { if (coverage < 90) exit 1 }'
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: contracts/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint-frontend:
    name: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint and typecheck frontend
        working-directory: frontend
        run: npx eslint . && npx tsc --noEmit

  test-frontend:
    name: test-frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run

  build-frontend:
    name: build-frontend
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  slither:
    name: slither
    runs-on: ubuntu-latest
    needs: lint-contracts
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Slither report
        run: |
          pip install slither-analyzer --break-system-packages
          slither contracts/src/ --detect all

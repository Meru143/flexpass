services:
  postgres:
    image: postgres:16-alpine
    container_name: flexpass-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flexpass
    ports:
      - "5432:5432"
    volumes:
      - flexpass_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flexpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    container_name: flexpass-anvil
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8545"
      - "--chain-id"
      - "31337"
      - "--block-time"
      - "2"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  flexpass_postgres_data:

